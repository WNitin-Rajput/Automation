name: CI

# Run continuous validation on every push, pull request, and manual trigger.
on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  NODE_ENV: test
  PORT: 3000
  APP_BASE_URL: http://127.0.0.1:3000

jobs:
  test:
    name: Test application
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Detect Playwright availability
        run: |
          if [ -f playwright.config.ts ] || [ -f playwright.config.js ] || [ -f playwright.config.mjs ] || [ -f playwright.config.cjs ] || grep -q '"playwright"' package.json 2>/dev/null; then
            echo "PLAYWRIGHT_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "PLAYWRIGHT_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: env.PLAYWRIGHT_ENABLED == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: |
          if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts && pkg.scripts.build ? 0 : 1)"; then
            npm run build
          else
            echo "No build script defined; skipping build."
          fi

      - name: Start application
        run: |
          npm start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for application health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS "$APP_BASE_URL/items" >/dev/null; then
              echo "Application is reachable"
              exit 0
            fi
            if [ -f server.pid ] && ! kill -0 "$(cat server.pid)" 2>/dev/null; then
              echo "Server exited early"
              cat server.log || true
              exit 1
            fi
            sleep 2
          done
          echo "Application did not become ready in time"
          cat server.log || true
          exit 1

      - name: Run automated tests
        id: tests
        run: |
          if [ "$PLAYWRIGHT_ENABLED" = "true" ]; then
            npx playwright test --reporter=html,junit
          else
            npm test -- --ci
          fi

      - name: Generate workflow summary
        if: always()
        run: |
          echo "## CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow: $GITHUB_WORKFLOW" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            echo "- Status: ✅ Passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Status: ❌ Failed" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test reports and artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
            junit.xml
            server.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
            screenshots/
            videos/
            server.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop application
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" 2>/dev/null || true
          fi
